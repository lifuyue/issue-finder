<text x="1180" y="888" text-anchor="middle" font-size="31" font-weight="850" fill="#172033">Memory and Evaluation Feedback Loop</text>
<text x="1180" y="925" text-anchor="middle" font-size="21" font-weight="550" fill="#5c667a">Every exposure, approval, dispatch outcome, result artifact, and GitHub interaction becomes a raw event.</text>
