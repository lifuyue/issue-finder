<text x="1860" y="690" text-anchor="middle" font-size="27" font-weight="850" fill="#172033">Independent Offline Stop Point</text>
<text x="1860" y="728" text-anchor="middle" font-size="20" font-weight="550" fill="#5c667a">The workflow can stop after Package and still produce handoff, inbox item, and report.</text>
<text x="1860" y="760" text-anchor="middle" font-size="20" font-weight="550" fill="#5c667a">Dispatch, native sessions, and GitHub write-back remain optional higher-level paths.</text>
